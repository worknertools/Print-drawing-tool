  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Drawing Tool - High-Res A3 Edition</title>
    <style>
        :root {
            --bg-page: #f2f2f2;        
            --bg-canvas: #f0e7e0;      
            --bg-card: #ffffff;
            --border-color: #e0ddd5;
            --font-mono: 'Courier New', Courier, 'PingFang SC', 'Microsoft YaHei', 'Source Han Sans SC', 'Noto Sans CJK SC', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg-page);
            font-family: var(--font-mono);
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;
            color: #000;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 1100px; 
            max-width: 98vw;
            height: 850px; 
            max-height: 95vh;
            gap: 80px; 
            align-items: center;
            justify-content: center;
        }

        .canvas-section {
            flex: 0 0 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #drawCanvas {
            background-color: #fff;
            cursor: default; 
            border: none;
            box-shadow: none;
            outline: none;
            width: 600px; 
            height: 800px;
            touch-action: none;
            image-rendering: auto; 
        }

        .eraser-controls, #brush-cursor { display: none; }

        .sidebar {
            flex: 0 0 280px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 800px; 
        }

        .box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 20px 18px; 
        }

        .label {
            font-size: 11px;
            font-weight: 900;
            margin-bottom: 12px;
            display: block;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .section-divider { margin-top: 30px; }

        .color-group { display: flex; flex-direction: row; justify-content: space-between; margin-top: 5px; }
        .color-item { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
        .color-item span { font-size: 10px; font-weight: bold; }
        .color-row { display: flex; align-items: center; gap: 4px; }

        .preset-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .custom-picker-wrap {
            position: relative;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        #brush-picker-ui { background: #7d5fff; }
        #bg-picker-ui { background: #dcd1ff; } 

        input[type="color"].custom-picker {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            border: none;
            padding: 0;
            background: transparent;
            opacity: 0; 
        }

        .bg-upload-container { margin-top: 20px; width: 100%; }
        
        /* 保持 34px 固定高度的上传框 */
        .upload-box {
            width: 100%; 
            height: 34px; 
            padding: 0 10px;
            border: 1px solid var(--border-color); background: #fff;
            font-family: var(--font-mono); font-size: 11px; font-weight: bold;
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            text-transform: uppercase; 
            position: relative;
            overflow: hidden;
        }
        .upload-box:hover { background: #fafafa; }
        
        .filename-wrap { display: none; width: 100%; justify-content: center; align-items: center; gap: 8px; height: 100%; }
        .filename-text { max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #333; line-height: 1; }
        
        .btn-cancel-x { 
            color: #bbb; 
            font-size: 22px; 
            font-weight: 100; 
            cursor: pointer; 
            line-height: 0.8; 
            user-select: none; 
            display: inline-block; 
        }
        .btn-cancel-x:hover { color: #888; }

        .slider-wrap { margin-bottom: 25px; } 
        .slider-info { display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; margin-bottom: 6px; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 1px; background: #000; outline: none; margin: 12px 0; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; background: #fff;
            border: 1.5px solid #000; border-radius: 50%; cursor: pointer;
        }

        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        
        .btn-ui { 
            padding: 7px 1px; 
            border: 1px solid var(--border-color); 
            background: #fff; 
            font-family: var(--font-mono); 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            line-height: 1.2; 
        }
        .btn-ui.active { background: #000; color: #fff; }
        .btn-black { background: #000; color: #fff; }

        .footer-action-wrap { margin-top: auto; display: flex; gap: 8px; }
        .btn-undo-main { flex: 1; padding: 15px 5px; background: #808080; border: none; color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-undo-main:active { background: #000; }
        .btn-clear-main { flex: 1; padding: 15px 5px; background-color: #808080; border: none; color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .nav-link { font-size: 20px; color: #000; text-decoration: none; margin-bottom: 5px; display: inline-block; font-weight: 900; line-height: 1.1; text-transform: uppercase; letter-spacing: -1px; }
    </style>
</head>
<body>
<div class="container">
    <div class="canvas-section" id="canvas-container">
        <canvas id="drawCanvas" width="600" height="800"></canvas>
    </div>
    <div class="sidebar">
        <div class="nav-link">Rough Feeling Graphics<br>Drawing Tool</div>
        <div class="box">
            <span class="label">COLOR SETTINGS 颜色设置</span>
            <div class="color-group">
                <div class="color-item">
                    <span>BRUSH 画笔</span>
                    <div class="color-row">
                        <div class="preset-dot" style="background:#000000" onclick="quickSetBrush('#000000')"></div>
                        <div class="preset-dot" style="background:#00c3ff" onclick="quickSetBrush('#00c3ff')"></div>
                        <div class="preset-dot" style="background:#ff4d00" onclick="quickSetBrush('#ff4d00')"></div>
                        <div class="preset-dot" style="background:#ffb2c1" onclick="quickSetBrush('#ffb2c1')"></div>
                        <div class="preset-dot" style="background:#ffd000" onclick="quickSetBrush('#ffd000')"></div>
                        <div class="custom-picker-wrap" id="brush-picker-ui"><input type="color" class="custom-picker" id="pick-brush" value="#000000" oninput="quickSetBrush(this.value)"></div>
                    </div>
                </div>
                <div class="color-item">
                    <span>CANVAS 画布</span>
                    <div class="color-row">
                        <div class="preset-dot" style="background:#f0e7e0" onclick="quickSetBg('#f0e7e0')"></div>
                        <div class="preset-dot" style="background:#d8d3c7" onclick="quickSetBg('#d8d3c7')"></div>
                        <div class="preset-dot" style="background:#c5c9c7" onclick="quickSetBg('#c5c9c7')"></div>
                        <div class="preset-dot" style="background:#c9b9b5" onclick="quickSetBg('#c9b9b5')"></div>
                        <div class="preset-dot" style="background:#f2d5d5" onclick="quickSetBg('#f2d5d5')"></div>
                        <div class="custom-picker-wrap" id="bg-picker-ui"><input type="color" class="custom-picker" id="pick-bg" value="#f0e7e0" oninput="quickSetBg(this.value)"></div>
                    </div>
                </div>
            </div>
            <div class="bg-upload-container">
                <div class="upload-box" id="upload-box-ui" onclick="handleUploadClick(event)">
                    <span id="upload-prompt">上传背景图片</span>
                    <div class="filename-wrap" id="filename-wrap">
                        <span class="filename-text" id="filename-text"></span>
                        <span class="btn-cancel-x" onclick="removeBgImage(event)">×</span>
                    </div>
                </div>
                <input type="file" id="inp-bg-image" hidden accept="image/*">
                <div id="bg-opacity-wrap" class="slider-wrap" style="display: none; margin-top: 15px;">
                    <div class="slider-info"><span>BG OPACITY 背景透明度</span><span id="val-bg-opacity">50%</span></div>
                    <input type="range" id="inp-bg-opacity" min="0" max="100" value="50">
                </div>
            </div>
            <span class="label section-divider">BRUSH STYLE 画笔风格</span>
            <div class="btn-group">
                <button id="mode-blocky" class="btn-ui" onclick="setMode('blocky')">方块</button>
                <button id="mode-marker" class="btn-ui active" onclick="setMode('marker')">马克</button>
                <button id="mode-ink" class="btn-ui" onclick="setMode('ink')">墨韵</button>
                <button id="mode-organic" class="btn-ui" onclick="setMode('organic')">有机</button>
                <button id="mode-jitter" class="btn-ui" onclick="setMode('jitter')">抖动</button>
                <button id="mode-pixel" class="btn-ui" onclick="setMode('pixel')">像素</button>
                <button id="mode-flat" class="btn-ui" onclick="setMode('flat')">哥特</button>
                <button id="mode-ribbon" class="btn-ui" onclick="setMode('ribbon')">平笔</button>
                <button id="mode-pix-thick" class="btn-ui" onclick="setMode('pix-thick')">像素粗笔</button>
                <button id="mode-beads" class="btn-ui" onclick="setMode('beads')">圆珠</button>
                <button id="mode-weave" class="btn-ui" onclick="setMode('weave')">枯笔</button>
                <button id="mode-calligraphy" class="btn-ui" onclick="setMode('calligraphy')">炭笔</button>
            </div>
            <div class="slider-wrap section-divider">
                <div class="slider-info"><span>BRUSH SIZE 画笔大小</span><span id="val-size">12px</span></div>
                <input type="range" id="inp-size" min="2" max="100" value="12">
            </div>
            <div id="rough-wrap" class="slider-wrap">
                <div class="slider-info"><span id="lbl-rough">ROUGHNESS 粗糙度</span><span id="val-rough">50%</span></div>
                <input type="range" id="inp-rough" min="0" max="100" value="50">
            </div>
            <span class="label section-divider">SAVE FILE 保存文件</span>
            <div class="btn-group">
                <button class="btn-ui btn-black" onclick="downloadJPG()">JPG</button>
                <button class="btn-ui btn-black" onclick="downloadPNG()">PNG</button>
                <button class="btn-ui btn-black" onclick="downloadSVG()">SVG</button>
            </div>
        </div>
        <div class="footer-action-wrap">
            <button class="btn-undo-main" onclick="undo()">返回上一步</button>
            <button class="btn-clear-main" onclick="clearCanvas()">清空画布</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    
    let isDrawing = false;
    let bSize = 12, bRough = 0.5, bColor = '#000000', defaultBgColor = '#f0e7e0', bgColor = '#f0e7e0'; 
    let bgImage = null, bgOpacity = 0.5, bgBase64 = ""; 
    let lastX = 0, lastY = 0, lastRawX = 0, lastRawY = 0, lastGridX = null, lastGridY = null; 
    let brushMode = 'marker', currentW = 12, allPaths = [], weaveDist = 0, lastPressure = 0.5;

    const bufferCanvas = document.createElement('canvas');
    bufferCanvas.width = 600; bufferCanvas.height = 800;
    const bCtx = bufferCanvas.getContext('2d');

    function initCanvas() { ctx.lineCap = 'round'; ctx.lineJoin = 'round'; refreshScreen(); }
    initCanvas();

    function undo() { if (allPaths.length > 0) { allPaths.pop(); refreshScreen(); } }
    window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); } });

    function quickSetBrush(hex) { bColor = hex; document.getElementById('brush-picker-ui').style.background = hex; document.getElementById('pick-brush').value = hex; }
    function quickSetBg(hex) { bgColor = hex; document.getElementById('bg-picker-ui').style.background = '#dcd1ff'; document.getElementById('pick-bg').value = hex; refreshScreen(); }

    function refreshScreen() {
        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (bgImage) { ctx.save(); ctx.globalAlpha = bgOpacity; const drawW = canvas.width, drawH = bgImage.height * (canvas.width / bgImage.width), drawY = (canvas.height - drawH) / 2; ctx.drawImage(bgImage, 0, drawY, drawW, drawH); ctx.restore(); }
        bCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
        allPaths.forEach(path => drawPathToContext(bCtx, path, 1));
        ctx.drawImage(bufferCanvas, 0, 0);
    }

    function drawPathToContext(targetCtx, path, scale) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.strokeStyle = path.color; targetCtx.fillStyle = path.color;
        targetCtx.lineCap = 'round'; targetCtx.lineJoin = 'round';
        if (path.mode === 'ribbon') {
            if (!path.points || path.points.length < 2) return;
            targetCtx.lineCap = 'butt'; targetCtx.lineWidth = path.width * scale;
            targetCtx.beginPath(); targetCtx.moveTo(path.points[0].x * scale, path.points[0].y * scale);
            for(let i = 1; i < path.points.length; i++) targetCtx.lineTo(path.points[i].x * scale, path.points[i].y * scale);
            targetCtx.stroke();
        } else if (['blocky', 'pixel', 'pix-thick'].includes(path.mode)) {
            path.segments.forEach(seg => targetCtx.fillRect(seg.x * scale, seg.y * scale, seg.w * scale, seg.w * scale));
        } else if (path.mode === 'beads') {
            path.segments.forEach(seg => { targetCtx.beginPath(); targetCtx.arc(seg.x * scale, seg.y * scale, (seg.w/2) * scale, 0, Math.PI * 2); targetCtx.fill(); });
        } else if (['flat', 'calligraphy'].includes(path.mode)) {
            path.segments.forEach(seg => {
                if(path.mode === 'calligraphy') { 
                    targetCtx.globalAlpha = seg.alpha || 1; targetCtx.beginPath(); targetCtx.lineWidth = seg.w * scale; 
                    targetCtx.moveTo(seg.x1 * scale, seg.y1 * scale); targetCtx.lineTo(seg.x2 * scale, seg.y2 * scale); targetCtx.stroke();
                } else { targetCtx.beginPath(); targetCtx.moveTo(seg.x1 * scale, seg.y1 * scale); targetCtx.lineTo(seg.x2 * scale, seg.y2 * scale); targetCtx.lineTo(seg.x3 * scale, seg.y3 * scale); targetCtx.lineTo(seg.x4 * scale, seg.y4 * scale); targetCtx.closePath(); targetCtx.fill(); }
            });
            targetCtx.globalAlpha = 1;
        } else if (path.mode === 'weave') {
            path.segments.forEach(seg => {
                targetCtx.save(); targetCtx.translate(seg.x * scale, seg.y * scale); targetCtx.rotate(seg.ang);
                const sz = seg.sz * scale, w = sz / 5, h = sz * 0.42;
                if(seg.is3) { targetCtx.fillRect(-sz/2, -h/2, w, h); targetCtx.fillRect(-w/2, -h/2, w, h); targetCtx.fillRect(sz/2-w, -h/2, w, h); }
                else { targetCtx.fillRect(-sz/2+w, -h/2, w, h); targetCtx.fillRect(sz/2-w*2, -h/2, w, h); }
                targetCtx.restore();
            });
        } else { path.segments.forEach(seg => { targetCtx.beginPath(); targetCtx.lineWidth = seg.w * scale; targetCtx.moveTo(seg.x1 * scale, seg.y1 * scale); targetCtx.lineTo(seg.x2 * scale, seg.y2 * scale); targetCtx.stroke(); }); }
    }

    function handleUploadClick(e) { if (!bgImage) document.getElementById('inp-bg-image').click(); }
    document.getElementById('inp-bg-image').onchange = function(e) {
        const file = e.target.files[0]; if (!file) return;
        document.getElementById('filename-text').innerText = file.name; document.getElementById('upload-prompt').style.display = 'none'; document.getElementById('filename-wrap').style.display = 'flex'; document.getElementById('bg-opacity-wrap').style.display = 'block'; 
        const reader = new FileReader();
        reader.onload = function(event) { 
            bgBase64 = event.target.result;
            const img = new Image(); img.onload = function() { bgImage = img; refreshScreen(); }; img.src = bgBase64; 
        };
        reader.readAsDataURL(file);
    };

    function removeBgImage(e) { if(e) e.stopPropagation(); bgImage = null; bgBase64 = ""; document.getElementById('inp-bg-image').value = ''; document.getElementById('upload-prompt').style.display = 'block'; document.getElementById('filename-wrap').style.display = 'none'; document.getElementById('bg-opacity-wrap').style.display = 'none'; refreshScreen(); }
    document.getElementById('inp-bg-opacity').oninput = function() { bgOpacity = this.value / 100; document.getElementById('val-bg-opacity').innerText = this.value + '%'; refreshScreen(); };

    function setMode(mode) {
        brushMode = mode;
        const modes = ['blocky', 'marker', 'ink', 'organic', 'jitter', 'pixel', 'flat', 'ribbon', 'pix-thick', 'beads', 'weave', 'calligraphy'];
        modes.forEach(m => { const btn = document.getElementById(`mode-${m}`); if(btn) btn.classList.toggle('active', mode === m); });
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX), clientY = e.clientY || (e.touches && e.touches[0].clientY);
        let p = e.pressure !== undefined && e.pressure !== 0 ? e.pressure : 0.5;
        if (e.pointerType === 'mouse' && isDrawing) { const d = Math.hypot(clientX - lastRawX, clientY - lastRawY); p = Math.max(0.1, Math.min(1.0, 1.0 - (d / 40))); }
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height), rawX: clientX, rawY: clientY, pressure: p };
    }

    function start(e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        isDrawing = true; const pos = getPos(e);
        lastX = pos.x; lastY = pos.y; lastRawX = pos.rawX; lastRawY = pos.rawY;
        const g = (brushMode === 'pix-thick') ? 6 : bSize; lastGridX = Math.floor(pos.x / g); lastGridY = Math.floor(pos.y / g);
        allPaths.push({ mode: brushMode, color: bColor, width: bSize, segments: [], points: (brushMode === 'ribbon' ? [{x:pos.x, y:pos.y}] : []), pixelSet: new Set() });
        updateDrawLogic(e);
    }

    function updateDrawLogic(e) {
        if (!isDrawing) return; const pos = getPos(e); const currentStroke = allPaths[allPaths.length - 1];
        lastPressure = lastPressure * 0.7 + pos.pressure * 0.3;
        if (brushMode === 'pixel' || brushMode === 'pix-thick') {
            const g = (brushMode === 'pix-thick') ? 6 : bSize, currGridX = Math.floor(pos.x / g), currGridY = Math.floor(pos.y / g);
            let x = lastGridX, y = lastGridY, dx = Math.abs(currGridX - x), dy = Math.abs(currGridY - y), sx = (x < currGridX) ? 1 : -1, sy = (y < currGridY) ? 1 : -1, err = dx - dy;
            while (true) {
                const range = (brushMode === 'pix-thick') ? Math.floor(bSize/g/2) : 0;
                for(let ox=-range; ox<=range; ox++) for(let oy=-range; oy<=range; oy++) {
                    const drawX = (x+ox)*g, drawY = (y+oy)*g, key = `${drawX},${drawY}`;
                    if (!currentStroke.pixelSet.has(key)) { currentStroke.segments.push({ x: drawX, y: drawY, w: g }); currentStroke.pixelSet.add(key); }
                }
                if (x === currGridX && y === currGridY) break;
                const e2 = 2 * err; if (e2 > -dy) { err -= dy; x += sx; } if (e2 < dx) { err += dx; y += sy; }
            }
            lastGridX = currGridX; lastGridY = currGridY;
        } else if (brushMode === 'organic') {
            const x2 = (pos.x === lastX) ? pos.x + 0.1 : pos.x, y2 = (pos.y === lastY) ? pos.y + 0.1 : pos.y;
            currentStroke.segments.push({ x1: lastX, y1: lastY, x2: x2, y2: y2, w: bSize });
            lastX = pos.x; lastY = pos.y;
        } else if (brushMode === 'calligraphy') {
            const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
            const steps = Math.max(1, Math.ceil(dist / 1.5));
            const angle = Math.atan2(pos.y - lastY, pos.x - lastX);
            const baseSize = bSize * (0.2 + lastPressure * 1.5);
            for(let i=0; i<steps; i++){
                const t = i/steps, cx = lastX + (pos.x - lastX) * t, cy = lastY + (pos.y - lastY) * t;
                const bristleCount = Math.floor(5 + lastPressure * 15);
                for(let j=0; j<bristleCount; j++){
                    const feibai = bRough * 1.2 * (1.1 - lastPressure);
                    if(Math.random() < feibai) continue; 
                    const spread = baseSize * 0.6, offset = (Math.random() - 0.5) * spread, bristleW = (0.5 + Math.random() * 1.5) * (0.5 + lastPressure);
                    const bx1 = cx + Math.cos(angle + Math.PI/2) * offset, by1 = cy + Math.sin(angle + Math.PI/2) * offset;
                    const bLen = Math.random() * baseSize * 0.5 + 0.1, bx2 = bx1 + Math.cos(angle) * bLen, by2 = by1 + Math.sin(angle) * bLen;
                    currentStroke.segments.push({ x1: bx1, y1: by1, x2: bx2, y2: by2, w: bristleW, alpha: 0.3 + (Math.random() * 0.7 * lastPressure) });
                }
            }
            lastX = pos.x; lastY = pos.y;
        } else if (brushMode === 'jitter') {
            const jitterW = bSize * (1 + (Math.random() - 0.5) * bRough * 0.4);
            currentStroke.segments.push({ x1: lastX, y1: lastY, x2: pos.x + (Math.random()-0.5)*5, y2: pos.y + (Math.random()-0.5)*5, w: jitterW });
            lastX = pos.x; lastY = pos.y;
        } else if (['beads', 'blocky'].includes(brushMode)) {
            const dist = Math.hypot(pos.x - lastX, pos.y - lastY), spacing = bSize * (0.1 + bRough * 2.9);
            if (dist >= spacing || currentStroke.segments.length === 0) {
                if (brushMode === 'beads') currentStroke.segments.push({ x: pos.x, y: pos.y, w: bSize });
                else currentStroke.segments.push({ x: pos.x - bSize/2, y: pos.y - bSize/2, w: bSize });
                lastX = pos.x; lastY = pos.y;
            }
        } else if (brushMode === 'marker') {
            currentW = currentW * 0.7 + (bSize * (0.8 + Math.random()*0.4)) * 0.3;
            currentStroke.segments.push({ x1: lastX, y1: lastY, x2: pos.x, y2: pos.y, w: currentW });
            lastX = pos.x; lastY = pos.y;
        } else if (brushMode === 'ink') {
            const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
            currentW = currentW * 0.6 + Math.max(bSize * 0.2, bSize - (dist * 0.8)) * 0.4;
            currentStroke.segments.push({ x1: lastX, y1: lastY, x2: pos.x, y2: pos.y, w: currentW });
            lastX = pos.x; lastY = pos.y;
        } else if (brushMode === 'flat') {
            const angle = Math.PI / 4, dx = Math.cos(angle)*(bSize/2), dy = Math.sin(angle)*(bSize/2);
            currentStroke.segments.push({x1:lastX-dx, y1:lastY+dy, x2:lastX+dx, y2:lastY-dy, x3:pos.x+dx, y3:pos.y-dy, x4:pos.x-dx, y4:pos.y+dy});
            lastX = pos.x; lastY = pos.y;
        } else if (brushMode === 'ribbon') { currentStroke.points.push({x: pos.x, y: pos.y});
        } else if (brushMode === 'weave') {
            const dx = pos.x-lastX, dy = pos.y-lastY, d = Math.sqrt(dx*dx+dy*dy);
            if(d > 2 || currentStroke.segments.length === 0) {
                const angle = Math.atan2(dy, dx), step = bSize*0.35;
                for(let j=0; j<d; j+=2){
                    const r = j/d, curX = lastX+dx*r, curY = lastY+dy*r, is3 = Math.floor(weaveDist/step)%2 === 0;
                    currentStroke.segments.push({x:curX, y:curY, ang:angle, sz:bSize, is3:is3}); weaveDist += 2;
                }
                lastX = pos.x; lastY = pos.y;
            }
        }
        lastRawX = pos.rawX; lastRawY = pos.rawY; refreshScreen();
    }

    function end() { isDrawing = false; lastGridX = null; lastGridY = null; }
    canvas.addEventListener('pointerdown', start);
    window.addEventListener('pointermove', updateDrawLogic);
    window.addEventListener('pointerup', end);

    function getHighResCanvas(isTransparent) {
        const a3Width = 3508; const scale = a3Width / 600;
        const hCanvas = document.createElement('canvas');
        hCanvas.width = a3Width; hCanvas.height = 800 * scale; 
        const hCtx = hCanvas.getContext('2d');
        if (!isTransparent) { 
            hCtx.fillStyle = bgColor; hCtx.fillRect(0, 0, hCanvas.width, hCanvas.height); 
            if (bgImage) { hCtx.save(); hCtx.globalAlpha = bgOpacity; const drawW = hCanvas.width, drawH = bgImage.height * (hCanvas.width / bgImage.width), drawY = (hCanvas.height - drawH) / 2; hCtx.drawImage(bgImage, 0, drawY, drawW, drawH); hCtx.restore(); }
        }
        allPaths.forEach(path => drawPathToContext(hCtx, path, scale));
        return hCanvas;
    }

    function downloadPNG() { const c = getHighResCanvas(true); const link = document.createElement('a'); link.download = 'artwork_A3.png'; link.href = c.toDataURL('image/png'); link.click(); }
    function downloadJPG() { const c = getHighResCanvas(false); const link = document.createElement('a'); link.download = 'artwork_A3.jpg'; link.href = c.toDataURL('image/jpeg', 0.95); link.click(); }
    
    // 恢复：最精细化的 SVG 导出效果逻辑
    function downloadSVG() {
        let svgElements = "";
        allPaths.forEach(path => {
            const color = path.color;
            if (path.mode === 'ribbon' && path.points.length > 1) {
                let d = `M${path.points[0].x.toFixed(2)},${path.points[0].y.toFixed(2)}`;
                for(let i=1; i<path.points.length; i++) d += ` L${path.points[i].x.toFixed(2)},${path.points[i].y.toFixed(2)}`;
                svgElements += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${path.width}" stroke-linecap="butt" stroke-linejoin="round" />`;
            } else if (['marker', 'ink', 'organic', 'jitter'].includes(path.mode)) {
                if (path.segments.length > 0) {
                    let d = ""; path.segments.forEach(seg => { d += `M${seg.x1.toFixed(2)},${seg.y1.toFixed(2)} L${seg.x2.toFixed(2)},${seg.y2.toFixed(2)} `; });
                    svgElements += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${path.width}" stroke-linecap="round" />`;
                }
            } else if (['blocky', 'pixel', 'pix-thick'].includes(path.mode)) {
                let rects = ""; path.segments.forEach(seg => { rects += `<rect x="${seg.x.toFixed(2)}" y="${seg.y.toFixed(2)}" width="${seg.w}" height="${seg.w}" fill="${color}" />`; });
                svgElements += `<g>${rects}</g>`;
            } else if (path.mode === 'beads') {
                let circles = ""; path.segments.forEach(seg => { circles += `<circle cx="${seg.x.toFixed(2)}" cy="${seg.y.toFixed(2)}" r="${(seg.w/2).toFixed(2)}" fill="${color}" />`; });
                svgElements += `<g>${circles}</g>`;
            } else if (path.mode === 'calligraphy') {
                let lines = ""; path.segments.forEach(seg => { lines += `<line x1="${seg.x1.toFixed(2)}" y1="${seg.y1.toFixed(2)}" x2="${seg.x2.toFixed(2)}" y2="${seg.y2.toFixed(2)}" stroke="${color}" stroke-width="${seg.w.toFixed(2)}" stroke-opacity="${seg.alpha.toFixed(2)}" stroke-linecap="round" />`; });
                svgElements += `<g>${lines}</g>`;
            } else if (path.mode === 'flat') {
                let polys = ""; path.segments.forEach(seg => { polys += `<polygon points="${seg.x1.toFixed(2)},${seg.y1.toFixed(2)} ${seg.x2.toFixed(2)},${seg.y2.toFixed(2)} ${seg.x3.toFixed(2)},${seg.y3.toFixed(2)} ${seg.x4.toFixed(2)},${seg.y4.toFixed(2)}" fill="${color}" />`; });
                svgElements += `<g>${polys}</g>`;
            } else if (path.mode === 'weave') {
                let weaves = ""; path.segments.forEach(seg => {
                    const sz = seg.sz, w = sz / 5, h = sz * 0.42, rotate = (seg.ang * 180 / Math.PI).toFixed(2);
                    if(seg.is3) {
                        weaves += `<rect x="${-sz/2}" y="${-h/2}" width="${w}" height="${h}" fill="${color}" transform="translate(${seg.x},${seg.y}) rotate(${rotate})" />`;
                        weaves += `<rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" fill="${color}" transform="translate(${seg.x},${seg.y}) rotate(${rotate})" />`;
                        weaves += `<rect x="${sz/2-w}" y="${-h/2}" width="${w}" height="${h}" fill="${color}" transform="translate(${seg.x},${seg.y}) rotate(${rotate})" />`;
                    } else {
                        weaves += `<rect x="${-sz/2+w}" y="${-h/2}" width="${w}" height="${h}" fill="${color}" transform="translate(${seg.x},${seg.y}) rotate(${rotate})" />`;
                        weaves += `<rect x="${sz/2-w*2}" y="${-h/2}" width="${w}" height="${h}" fill="${color}" transform="translate(${seg.x},${seg.y}) rotate(${rotate})" />`;
                    }
                });
                svgElements += `<g>${weaves}</g>`;
            }
        });
        const svgFull = `<?xml version="1.0" encoding="UTF-8"?><svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" fill="none">${svgElements}</svg>`;
        const link = document.createElement('a'); 
        link.href = URL.createObjectURL(new Blob([svgFull], {type: 'image/svg+xml'})); 
        link.download = 'artwork.svg'; link.click();
    }

    function clearCanvas() { allPaths = []; quickSetBg(defaultBgColor); removeBgImage(); refreshScreen(); }
    document.getElementById('inp-size').oninput = function() { bSize = parseInt(this.value); document.getElementById('val-size').innerText = this.value + 'px'; };
    document.getElementById('inp-rough').oninput = function() { bRough = this.value / 100; document.getElementById('val-rough').innerText = this.value + '%'; };
</script>
